name: Validate Release Secrets

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate macOS release credentials
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Check required secrets are present
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          APPLE_API_KEY_P8_B64: ${{ secrets.APPLE_API_KEY_P8_B64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          missing=0
          required=(
            APPLE_CERTIFICATE
            APPLE_CERTIFICATE_PASSWORD
            KEYCHAIN_PASSWORD
            APPLE_API_KEY_P8_B64
            APPLE_API_KEY_ID
            APPLE_API_ISSUER
            APPLE_SIGNING_IDENTITY
            TAURI_SIGNING_PRIVATE_KEY
          )

          for name in "${required[@]}"; do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::Missing GitHub secret: ${name}"
              missing=1
            fi
          done

          if [[ "$missing" -ne 0 ]]; then
            exit 1
          fi

          echo "All required release secrets are present."
        shell: bash

      - uses: pnpm/action-setup@v4
        with:
          version: "10.11.1"
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        shell: bash

      - name: Install minisign
        run: brew install minisign
        shell: bash

      - name: Validate Apple Developer ID certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          set -euo pipefail

          cert_path="$RUNNER_TEMP/developer-id-application.p12"
          keychain_name="release-validation.keychain"

          printf '%s' "$APPLE_CERTIFICATE" | base64 --decode > "$cert_path"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$keychain_name"
          security default-keychain -s "$keychain_name"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$keychain_name"
          security set-keychain-settings -t 3600 -u "$keychain_name"
          security import "$cert_path" -k "$keychain_name" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$keychain_name"

          actual_identity="$(security find-identity -v -p codesigning "$keychain_name" | awk -F'"' '/Developer ID Application/ { print $2; exit }')"
          if [[ -z "$actual_identity" ]]; then
            echo "::error::No Developer ID Application identity found after importing APPLE_CERTIFICATE."
            exit 1
          fi

          if [[ "$actual_identity" != "$APPLE_SIGNING_IDENTITY" ]]; then
            echo "::error::APPLE_SIGNING_IDENTITY does not match the imported certificate identity."
            echo "Expected: $APPLE_SIGNING_IDENTITY"
            echo "Actual:   $actual_identity"
            exit 1
          fi

          codesign_test_path="$RUNNER_TEMP/codesign-test"
          cp /usr/bin/true "$codesign_test_path"
          codesign --force --sign "$APPLE_SIGNING_IDENTITY" "$codesign_test_path" >/dev/null
          codesign --verify --strict "$codesign_test_path" >/dev/null
          echo "Developer ID certificate imported and signing identity matches."
        shell: bash

      - name: Validate App Store Connect API key with notarytool
        env:
          APPLE_API_KEY_P8_B64: ${{ secrets.APPLE_API_KEY_P8_B64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          set -euo pipefail

          key_dir="$RUNNER_TEMP/appstoreconnect/private_keys"
          key_path="$key_dir/AuthKey_${APPLE_API_KEY_ID}.p8"
          mkdir -p "$key_dir"
          printf '%s' "$APPLE_API_KEY_P8_B64" | base64 --decode > "$key_path"
          chmod 600 "$key_path"

          if ! grep -q "BEGIN PRIVATE KEY" "$key_path"; then
            echo "::error::APPLE_API_KEY_P8_B64 did not decode to an App Store Connect .p8 private key."
            exit 1
          fi

          xcrun notarytool history \
            --key "$key_path" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER" \
            --output-format json >/dev/null

          echo "App Store Connect API key authenticated with notarytool."
        shell: bash

      - name: Validate Tauri updater signing key
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          private_key_path="$RUNNER_TEMP/tauri-updater.key"
          public_key_b64_path="$RUNNER_TEMP/tauri-updater.pub.b64"
          public_key_path="$RUNNER_TEMP/tauri-updater.pub"
          payload_path="$RUNNER_TEMP/update-payload.txt"
          minisig_path="$RUNNER_TEMP/update-payload.minisig"

          printf '%s' "$TAURI_SIGNING_PRIVATE_KEY" > "$private_key_path"
          chmod 600 "$private_key_path"

          node -e 'const fs = require("fs"); const c = JSON.parse(fs.readFileSync("apps/desktop/src-tauri/tauri.conf.json", "utf8")); process.stdout.write(c.plugins.updater.pubkey);' > "$public_key_b64_path"
          base64 --decode < "$public_key_b64_path" > "$public_key_path"

          if ! grep -q "minisign public key" "$public_key_path"; then
            echo "::error::The updater public key in tauri.conf.json is not a minisign public key."
            exit 1
          fi

          printf 'release-secret-validation\n' > "$payload_path"

          sign_args=(-f "$private_key_path")
          if [[ -n "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD:-}" ]]; then
            sign_args+=(-p "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD")
          fi

          (
            cd apps/desktop
            pnpm tauri signer sign "${sign_args[@]}" "$payload_path" >/dev/null
          )

          base64 --decode < "$payload_path.sig" > "$minisig_path"
          minisign -Vm "$payload_path" -p "$public_key_path" -x "$minisig_path" >/dev/null

          echo "Tauri updater private key signs and verifies against the committed public key."
        shell: bash
