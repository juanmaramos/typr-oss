name: "Setup Apple Certificate"
description: "Import and verify Apple Developer ID certificate for code signing"
inputs:
  apple-certificate:
    description: "Base64 encoded Apple certificate"
    required: true
  apple-certificate-password:
    description: "Password for the Apple certificate"
    required: true
  keychain-password:
    description: "Password for the temporary keychain"
    required: true
outputs:
  cert-id:
    description: "The certificate identity used for signing"
    value: ${{ steps.verify-cert.outputs.cert-id }}
runs:
  using: "composite"
  steps:
    - name: Setup certificate
      shell: bash
      env:
        APPLE_CERTIFICATE: ${{ inputs.apple-certificate }}
        APPLE_CERTIFICATE_PASSWORD: ${{ inputs.apple-certificate-password }}
        KEYCHAIN_PASSWORD: ${{ inputs.keychain-password }}
      run: |
        printf '%s' "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
        security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
        security default-keychain -s build.keychain
        security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
        security set-keychain-settings -t 3600 -u build.keychain
        security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
        security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
        security find-identity -v -p codesigning build.keychain

    - id: verify-cert
      shell: bash
      run: |
        CERT_INFO=$(security find-identity -v -p codesigning build.keychain | grep "Developer ID Application")
        CERT_ID=$(echo "$CERT_INFO" | awk -F'"' '{print $2}')
        echo "cert-id=$CERT_ID" >> "$GITHUB_OUTPUT"
        echo "Certificate imported."
