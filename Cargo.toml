[profile.dev]
incremental = true
opt-level = 0
debug = true

[profile.dev.package."*"]
opt-level = 1
debug = false

[workspace]
resolver = "2"
members = [
  "apps/desktop/src-tauri",
  "crates/*",
  "plugins/*",
]
exclude = [
  "crates/db-admin",
  "crates/lago",
]

[workspace.package]
rust-version = "1.86.0"

[workspace.dependencies]
typr-aec = { path = "crates/aec", package = "aec" }
typr-ai-retry = { path = "crates/ai-retry" }
typr-analytics = { path = "crates/analytics", package = "analytics" }
typr-audio = { path = "crates/audio", package = "audio" }
typr-audio-utils = { path = "crates/audio-utils", package = "audio-utils" }
typr-buffer = { path = "crates/buffer", package = "buffer" }
typr-calendar-apple = { path = "crates/calendar-apple", package = "calendar-apple" }
typr-calendar-google = { path = "crates/calendar-google", package = "calendar-google" }
typr-calendar-interface = { path = "crates/calendar-interface", package = "calendar-interface" }
typr-calendar-outlook = { path = "crates/calendar-outlook", package = "calendar-outlook" }
typr-chunker = { path = "crates/chunker", package = "chunker" }
typr-data = { path = "crates/data", package = "data" }
typr-db-core = { path = "crates/db-core", package = "db-core" }
typr-db-script = { path = "crates/db-script", package = "db-script" }
typr-db-user = { path = "crates/db-user", package = "db-user" }
typr-detect = { path = "crates/detect", package = "detect" }
typr-file = { path = "crates/file", package = "file" }
typr-gbnf = { path = "crates/gbnf", package = "gbnf" }
typr-gguf = { path = "crates/gguf", package = "gguf" }
typr-host = { path = "crates/host", package = "host" }
typr-language = { path = "crates/language", package = "language" }
typr-llama = { path = "crates/llama", package = "llama" }
typr-network = { path = "crates/network", package = "network" }
typr-notification = { path = "crates/notification", package = "notification" }
typr-notification2 = { path = "crates/notification2", package = "notification2" }
typr-notion = { path = "crates/notion", package = "notion" }
typr-onnx = { path = "crates/onnx", package = "onnx" }
typr-openai = { path = "crates/openai", package = "openai" }
typr-pyannote-local = { path = "crates/pyannote-local", package = "pyannote-local" }
