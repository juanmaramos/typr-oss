typr-ws = { path = "crates/ws", package = "ws" }
typr-ws-utils = { path = "crates/ws-utils", package = "ws-utils" }

typr-listener-interface = { path = "plugins/listener-interface", package = "listener-interface" }

tauri = "2.6"
tauri-build = "2.3"
tauri-nspanel = { git = "https://github.com/ahkohd/tauri-nspanel", branch = "v2" }
